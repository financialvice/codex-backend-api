<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <rect width="1200" height="630" fill="#000000"/>

  <!-- Outer frame -->
  <rect x="32" y="32" width="1136" height="566" fill="none" stroke="#0052ff" stroke-width="2"/>

  <!-- Title bar -->
  <line x1="32" y1="86" x2="1168" y2="86" stroke="#0052ff" stroke-width="2"/>
  <text x="56" y="67" font-family="Geist Mono" font-size="22" fill="#ffffff">chatfaucet.com</text>
  <text x="1144" y="67" font-family="Geist Mono" font-size="22" fill="#0052ff" text-anchor="end">● live</text>

  <!-- Title -->
  <text x="76" y="198" font-family="Geist Mono" font-size="88" font-weight="700" fill="#ffffff" letter-spacing="-1">CHAT FAUCET</text>

  <!-- Tagline -->
  <text x="80" y="246" font-family="Geist Mono" font-size="26" fill="#ffffff" opacity="0.72">Your ChatGPT plan → OpenAI-compatible Responses API</text>

  <!-- Code block -->
  <rect x="76" y="300" width="1048" height="200" fill="none" stroke="#0052ff" stroke-width="1" stroke-opacity="0.55"/>

  <g font-family="Geist Mono" font-size="26" xml:space="preserve">
    <text x="100" y="342" fill="#ffffff" opacity="0.5">~</text>
    <text x="130" y="342" fill="#0052ff">$</text>
    <text x="160" y="342" fill="#ffffff">bunx chatfaucet login</text>

    <text x="100" y="390" fill="#ffffff" opacity="0.5">~</text>
    <text x="130" y="390" fill="#0052ff">$</text>
    <text x="160" y="390" fill="#ffffff">export OPENAI_BASE_URL=https://chatfaucet.com/v1</text>

    <text x="100" y="438" fill="#ffffff" opacity="0.5">~</text>
    <text x="130" y="438" fill="#0052ff">$</text>
  </g>

  <!-- Blinking cursor on the empty prompt -->
  <rect x="160" y="416" width="14" height="28" fill="#0052ff"/>

  <!-- Footer tagline -->
  <text x="600" y="566" font-family="Geist Mono" font-size="22" fill="#ffffff" opacity="0.5" text-anchor="middle">any OpenAI SDK  ·  any agent  ·  your plan</text>
